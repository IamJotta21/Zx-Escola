name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json

    - name: Install, Build and Test Backend
      run: |
        cd backend
        npm ci
        npx prisma generate --schema=src/prisma/schema.prisma
        npm run build
        npm run test

    - name: Install, Lint and Build Frontend
      run: |
        cd frontend
        npm ci
        npm run lint
        npm run build
