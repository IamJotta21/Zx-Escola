version: '3.9'

# =============================================================================
# Zx-Escola SaaS — Docker Compose
# Development: docker-compose up
# Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
# =============================================================================

services:
  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: zx_escola_backend
    restart: unless-stopped
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=${JWT_SECRET:-zx-escola-jwt-dev-secret-mude-em-prod-32chars}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-zx-escola-refresh-dev-secret-mude-32chars}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - SUPABASE_BUCKET=${SUPABASE_BUCKET:-school-storage}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-200}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend/src:/app/src         # hot-reload source
      - backend_uploads:/app/src/uploads
      - backend_db:/app/src/prisma     # persist SQLite db
    networks:
      - zx_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Frontend SPA ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: zx_escola_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000/api}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - zx_network

volumes:
  backend_uploads:
    driver: local
  backend_db:
    driver: local

networks:
  zx_network:
    driver: bridge
